<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hanger BLE</title>
    <style>
        body { text-align: center; font-family: Arial; padding: 20px; }
        button { padding: 30px 50px; margin: 20px; font-size: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>Smart Hanger Control</h2>
    <button onclick="connect()">連線裝置</button>
    <br>
    <button onmousedown="send('OPEN_DOWN')" onmouseup="send('UP')" ontouchstart="send('OPEN_DOWN')" ontouchend="send('UP')">OPEN</button>
    <button onmousedown="send('CLOSE_DOWN')" onmouseup="send('UP')" ontouchstart="send('CLOSE_DOWN')" ontouchend="send('UP')">CLOSE</button>

    <script>
        let char;
        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "SmartHanger_S3" }],
                    optionalServices: ["12345678-1234-1234-1234-1234567890ab"]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("12345678-1234-1234-1234-1234567890ab");
                char = await service.getCharacteristic("abcd1234-1234-1234-1234-abcdef123456");
                alert("Android 藍牙連線成功！");
            } catch (e) { alert("連線失敗: " + e); }
        }

        async function send(cmd) {
            if (char) await char.writeValue(new TextEncoder().encode(cmd));
        }
    </script>
</body>
</html>
