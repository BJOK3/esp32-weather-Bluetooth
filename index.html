<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hanger Wi-Fi</title>
    <style>
        body { text-align: center; font-family: Arial; padding-top: 50px; }
        button { padding: 20px 40px; margin: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Smart Hanger Wi-Fi Control</h2>
    <p>ESP32 IP: <span id="ip-display">等待輸入...</span></p>

    <button
        onmousedown="send('OPEN_DOWN')" onmouseup="send('UP')"
        ontouchstart="send('OPEN_DOWN')" ontouchend="send('UP')">
        OPEN
    </button>

    <button
        onmousedown="send('CLOSE_DOWN')" onmouseup="send('UP')"
        ontouchstart="send('CLOSE_DOWN')" ontouchend="send('UP')">
        CLOSE
    </button>

    <script>
        // 請將這裡換成你 ESP32 的實際 IP
        const ESP32_URL = "http://172.20.10.12"; 

        async function send(cmd) {
            try {
                // 發送 GET 請求到 ESP32，例如: http://192.168.x.x/control?cmd=OPEN_DOWN
                const response = await fetch(`${ESP32_URL}/control?cmd=${cmd}`);
                console.log("Command sent:", cmd);
            } catch (error) {
                console.error("無法連接到 ESP32:", error);
                alert("無法連接到控制器，請檢查 Wi-Fi 是否正確。");
            }
        }
    </script>
</body>
</html>
