<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hanger Wi-Fi</title>
    <style>
        button {
        -webkit-tap-highlight-color: transparent; /* 關閉點擊時的藍色陰影 */
        touch-action: manipulation;               /* 優化觸控體驗 */
        user-select: none;                        /* 防止選取文字 */
        -webkit-user-select: none;
        }
        body { text-align: center; font-family: Arial; padding-top: 50px; }
        button { padding: 20px 40px; margin: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Smart Hanger Wi-Fi Control</h2>
    <p>ESP32 IP: <span id="ip-display">等待輸入...</span></p>

    <button
        autocorrect="off" 
        autocomplete="off"
        onmousedown="send('OPEN_DOWN')" onmouseup="send('UP')"
        ontouchstart="send('OPEN_DOWN')" ontouchend="send('UP')">
        OPEN
    </button>

    <button
        autocorrect="off" 
        autocomplete="off"
        onmousedown="send('CLOSE_DOWN')" onmouseup="send('UP')"
        ontouchstart="send('CLOSE_DOWN')" ontouchend="send('UP')">
        CLOSE
    </button>

    <script>
        const ESP32_URL = "http://172.20.10.12"; 

        async function send(cmd) {
            console.log("發送指令:", cmd);
            try {
                // 發送請求，不等待回傳，直接完成
                fetch(`${ESP32_URL}/control?cmd=${cmd}`, {
                    method: 'GET',
                    mode: 'no-cors'
                });
                // 移除原本的 catch 彈窗，只在 console 輸出，避免干擾使用
            } catch (error) {
                console.log("請求發出，瀏覽器可能無法解析回傳，但指令應已送出");
            }
        }
    </script>
</body>
</html>
