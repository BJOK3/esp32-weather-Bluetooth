
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  .wrap { max-width: 420px; margin: 0 auto; padding: 1.5rem 1rem; }
  .status-bar { background: var(--color-background-secondary); border: 2px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 14px 18px; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #B4B2A9; margin-right: 10px; flex-shrink: 0; transition: background 0.3s; }
  .dot.on { background: #639922; }
  .conn-text { font-size: 15px; color: var(--color-text-secondary); }
  .badge { font-size: 14px; font-weight: 500; padding: 4px 14px; border-radius: var(--border-radius-md); background: var(--color-background-tertiary); color: var(--color-text-secondary); border: 1.5px solid var(--color-border-secondary); transition: all 0.3s; }
  .badge.manual { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
  .badge.auto { background: #EAF3DE; color: #27500A; border-color: #97C459; }
  .btn-conn { width: 100%; padding: 18px; border-radius: var(--border-radius-lg); font-size: 18px; font-weight: 500; background: var(--color-background-primary); border: 2px solid var(--color-border-primary); color: var(--color-text-primary); cursor: pointer; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.15s; }
  .btn-conn:hover { background: var(--color-background-secondary); }
  .btn-conn:active { transform: scale(0.98); }
  .btn-conn i { font-size: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .btn-act { padding: 44px 16px; border-radius: var(--border-radius-lg); font-size: 20px; font-weight: 500; border: 2px solid var(--color-border-primary); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 12px; background: var(--color-background-primary); color: var(--color-text-primary); transition: all 0.15s; touch-action: manipulation; }
  .btn-act i { font-size: 36px; }
  .btn-act:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--color-border-tertiary); }
  .btn-act.cl:not(:disabled).pressing { background: #FAECE7; border-color: #D85A30; color: #4A1B0C; transform: scale(0.96); }
  .btn-act.op:not(:disabled).pressing { background: #E6F1FB; border-color: #378ADD; color: #042C53; transform: scale(0.96); }
  .btn-mode { width: 100%; padding: 20px; border-radius: var(--border-radius-lg); font-size: 18px; font-weight: 500; border: 2px solid var(--color-border-primary); cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.15s; }
  .btn-mode:hover { background: var(--color-background-secondary); }
  .btn-mode:active { transform: scale(0.98); }
  .btn-mode:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--color-border-tertiary); }
  .btn-mode i { font-size: 22px; }
  .log { margin-top: 1rem; font-size: 14px; color: var(--color-text-tertiary); font-family: var(--font-mono); min-height: 20px; text-align: center; }
</style>

<div class="wrap">
  <h2 class="sr-only">Smart Hanger 藍牙控制台</h2>

  <div class="status-bar">
    <div style="display:flex;align-items:center;">
      <div class="dot" id="dot"></div>
      <span class="conn-text" id="conn-text">未連線</span>
    </div>
    <span class="badge" id="badge">—</span>
  </div>

  <button class="btn-conn" id="btn-conn" onclick="toggleConnect()">
    <i class="ti ti-bluetooth" aria-hidden="true"></i>
    <span id="conn-label">連線裝置</span>
  </button>

  <div class="grid">
    <button class="btn-act cl" id="btn-close" disabled
      onmousedown="holdStart('CLOSE_DOWN',this)" onmouseup="holdEnd(this)" onmouseleave="holdEnd(this)"
      ontouchstart="holdStart('CLOSE_DOWN',this)" ontouchend="holdEnd(this)" ontouchcancel="holdEnd(this)">
      <i class="ti ti-arrow-up" aria-hidden="true"></i>
      收衣
    </button>
    <button class="btn-act op" id="btn-open" disabled
      onmousedown="holdStart('OPEN_DOWN',this)" onmouseup="holdEnd(this)" onmouseleave="holdEnd(this)"
      ontouchstart="holdStart('OPEN_DOWN',this)" ontouchend="holdEnd(this)" ontouchcancel="holdEnd(this)">
      <i class="ti ti-arrow-down" aria-hidden="true"></i>
      放衣
    </button>
  </div>

  <button class="btn-mode" id="btn-mode" onclick="send('MANUAL')" disabled>
    <i class="ti ti-refresh" aria-hidden="true"></i>
    <span id="mode-label">切換手動 / 自動</span>
  </button>

  <div class="log" id="log"></div>
</div>

<script>
  let char = null;
  let connected = false;
  let isManual = false;
  let holding = false;

  function setLog(msg) { document.getElementById('log').textContent = msg; }

  function setConnected(val) {
    connected = val;
    document.getElementById('dot').className = 'dot' + (val ? ' on' : '');
    document.getElementById('conn-text').textContent = val ? '已連線 SmartHanger_S3' : '未連線';
    document.getElementById('conn-label').textContent = val ? '中斷連線' : '連線裝置';
    document.getElementById('btn-close').disabled = !val;
    document.getElementById('btn-open').disabled = !val;
    document.getElementById('btn-mode').disabled = !val;
    if (!val) { const b = document.getElementById('badge'); b.className = 'badge'; b.textContent = '—'; }
  }

  function updateModeUI() {
    const b = document.getElementById('badge');
    const l = document.getElementById('mode-label');
    if (isManual) { b.className = 'badge manual'; b.textContent = '手動'; l.textContent = '切換為自動模式'; }
    else { b.className = 'badge auto'; b.textContent = '自動'; l.textContent = '切換為手動模式'; }
  }

  async function toggleConnect() {
    if (connected) { char = null; setConnected(false); setLog('已中斷連線'); return; }
    try {
      setLog('搜尋中...');
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'SmartHanger_S3' }],
        optionalServices: ['12345678-1234-1234-1234-1234567890ab']
      });
      device.addEventListener('gattserverdisconnected', () => { setConnected(false); setLog('裝置已斷線'); char = null; });
      setLog('連線中...');
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService('12345678-1234-1234-1234-1234567890ab');
      char = await service.getCharacteristic('abcd1234-1234-1234-1234-abcdef123456');
      setConnected(true); isManual = false; updateModeUI(); setLog('連線成功');
    } catch(e) { setLog('連線失敗：' + e.message); }
  }

  async function send(cmd) {
    if (!char) return;
    try {
      await char.writeValue(new TextEncoder().encode(cmd));
      if (cmd === 'MANUAL') { isManual = !isManual; updateModeUI(); setLog('切換為' + (isManual ? '手動' : '自動') + '模式'); }
      else { setLog('已送出：' + cmd); }
    } catch(e) { setLog('指令失敗：' + e.message); }
  }

  function holdStart(cmd, el) {
    if (!char || holding) return;
    holding = true;
    el.classList.add('pressing');
    send(cmd);
  }

  function holdEnd(el) {
    if (!holding) return;
    holding = false;
    el.classList.remove('pressing');
    send('UP');
  }
</script>
